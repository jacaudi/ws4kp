name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.APP_ID }}
    steps:
      # release-please reads Conventional Commits on main, maintains a "release PR"
      # (CHANGELOG.md + package.json bump), and on merge creates the vX.Y.Z tag +
      # GitHub Release. config-file / manifest-file use the defaults.
      #
      # Mint a short-lived token from the GitHub App so the tag/release release-please
      # pushes TRIGGERS the build-docker workflow (the default GITHUB_TOKEN cannot
      # trigger downstream workflows). If the App secrets aren't set the step is
      # skipped and release-please falls back to GITHUB_TOKEN — releases still work,
      # but the image must then be built by re-pushing the tag / dispatching build-docker.
      - name: Generate a GitHub App token
        id: app-token
        if: ${{ env.APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
